# Polymarket Watcher User Configuration
# This file defines which market categories/topics to watch and how to analyze them

# Topics to monitor
markets:
  # Note: "slug" currently behaves like a topic/category keyword, not an exact Polymarket market slug.
  # The discovery workflow fetches many closing-soon markets and uses Gemini to match them to these topics.
  - slug: "trump"
    enabled: true
  - slug: "geopolitics"
    enabled: true
  - slug: "us politics"
    enabled: true
  - slug: "middle east"
    enabled: true
  - slug: "tariffs"
    enabled: true
  - slug: "iran"
    enabled: true
  - slug: "trade war"
    enabled: true
    # Alert thresholds
    thresholds:
      # Alert when price moves more than X% in Y minutes
      priceChangePercent: 5
      priceChangeMinutes: 30
      # Alert when volume exceeds threshold
      volumeThreshold: 100000
    # Analysis configuration
    analysis:
      # How often to run AI analysis (in minutes)
      intervalMinutes: 60
      # Enable trend analysis
      trendAnalysis: true
      # Enable news correlation
      newsCorrelation: true

# Global settings
settings:
  # Default polling interval for market data (seconds)
  pollingIntervalSeconds: 30
  
  # Cache TTL for market data (seconds)
  cacheTtlSeconds: 60
  
  # Maximum concurrent market analyses
  maxConcurrentAnalyses: 5
  
  # Notification settings
  notifications:
    # Minimum time between alerts for same market (minutes)
    cooldownMinutes: 15
    # Include AI summary in notifications
    includeAiSummary: true
    # Mention users for high-priority alerts
    mentionOnHighPriority: true

# AI analysis settings
ai:
  # Model to use for analysis
  model: "gemini-2.5-flash"
  # Maximum tokens for analysis response
  maxTokens: 1024
  # Temperature for analysis
  temperature: 0.3
