version: "3.8"

services:
  # ===================
  # Polymarket Watcher
  # ===================
  polymarket-watcher:
    build:
      context: ../application
      dockerfile: Dockerfile
    container_name: polymarket-watcher
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - CONFIG_PATH=config/user-config.yaml
      # These should be set via .env file or secrets
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_DEFAULT_CHANNEL=${SLACK_DEFAULT_CHANNEL:-polymarket-alerts}
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY}
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY}
    volumes:
      - ../application/config:/app/config:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - polymarket-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===================
  # Redis Cache
  # ===================
  redis:
    image: redis:7-alpine
    container_name: polymarket-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - polymarket-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

networks:
  polymarket-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
